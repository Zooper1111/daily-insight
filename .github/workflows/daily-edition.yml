name: Daily Edition

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      smoke_test:
        description: "Test the OpenAI key without publishing a new edition"
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install openai
      - name: Generate today's edition
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          SMOKE_TEST: ${{ inputs.smoke_test && '1' || '0' }}
        run: python scripts/generate_edition.py
      - name: Commit and push
        run: |
          git config user.name "daily-insight-bot"
          git config user.email "actions@users.noreply.github.com"
          git add editions.json
          git diff --cached --quiet || git commit -m "Edition $(date -u +%F)"
          git push
