name: Daily Edition

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install openai
      - name: Generate today's edition
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
        run: python scripts/generate_edition.py
      - name: Commit and push
        run: |
          git config user.name "daily-insight-bot"
          git config user.email "actions@users.noreply.github.com"
          git add editions.json
          git diff --cached --quiet || git commit -m "Edition $(date -u +%F)"
          git push
